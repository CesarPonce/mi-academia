<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! - Word Search</title>
    <link rel="stylesheet" href="../../estilos.css">
	<script src="../../config.js"></script>
    <style>
    .cuerpo-descarga {
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px; /* Evita que choque con los bordes en móviles */
    }

    .contenedor-premium {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
        max-width: 650px; /* Reducimos un poco para que encaje mejor */
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centra todo el contenido internamente */
    }

    .tarjeta-descarga {
        display: flex;
        align-items: center;
        justify-content: center; /* Centra los elementos internos (imagen e info) */
        gap: 30px;
        background: #fff;
        border: 2px dashed #27ae60;
        padding: 30px;
        border-radius: 15px;
        margin: 30px 0;
        width: 100%; /* Ocupa todo el ancho del contenedor blanco */
        box-sizing: border-box; /* Evita que el padding la ensanche de más */
    }

    .info-libro {
        text-align: left; /* El texto se mantiene a la izquierda para leer bien */
    }

    .portada-libro {
        width: 140px;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        display: block;
    }

    /* Botón de descarga estilo profesional */
        .btn-descargar-final {
            display: block;          /* Cambia de inline-block a block */
			margin: 20px auto 0;     /* Centra el botón y da espacio arriba */
			text-align: center;      /* Asegura que el texto esté centrado por dentro */
            background-color: #e67e22; /* Color naranja para resaltar */
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 0 #d35400;
        }

        .btn-descargar-final:hover {
            background-color: #d35400;
            transform: translateY(-2px);
        }

    @media (max-width: 600px) {
        .tarjeta-descarga {
            flex-direction: column;
            text-align: center;
        }
		.portada-libro {
                width: 150px;
            }
        .info-libro {
            text-align: center;
        }
    }
</style>
</head>
<body class="cuerpo-descarga">

    <div class="contenedor-premium">
        <div class="mensaje-agradecimiento">
            <h1>¡Gracias por tu Compra!</h1>
            <p>Agradezco de corazón tu apoyo a nuestro trabajo.</p>
        </div>

        <div class="tarjeta-descarga">
            <img src="../../imagenes/word-search.png" alt="Portada Word Search" class="portada-libro">
            
            <div class="info-libro">
                <h3>Libro de Sopa de Letras en Inglés</h3>
                <p><strong>Formato:</strong> PDF Digital de alta calidad.<br>
                   <strong>Autor:</strong> Caaplabs</p>
                
                <a href="#" id="btn-dinamico" class="btn-descargar-final">Descargar ahora</a>
            </div>
        </div>

        <p style="font-size: 0.8rem; color: #999;">
            ¿Tienes problemas con la descarga? Escríbeme directamente por WhatsApp.
        </p>
    </div>

	<script>
		// Buscamos los datos de "emily" en nuestro archivo maestro
		const datosLibro = CONFIG_LIBROS["word-search"];

		// Le asignamos el link de Drive al botón automáticamente
		const boton = document.getElementById("btn-dinamico");
		boton.href = datosLibro.linkDrive;
		
		// Opcional: Esto hará que el archivo se descargue con un nombre bonito si el navegador lo permite
		boton.setAttribute("download", datosLibro.nombre + ".pdf");
	</script>
</body>
</html>
